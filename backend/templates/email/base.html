<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: Arial, sans-serif; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #2E6DA4, #1a4a75); padding: 32px 40px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 28px; letter-spacing: 1px; }
    .header p { color: #AED6F1; margin: 6px 0 0; font-size: 14px; }
    .body { padding: 40px; color: #333333; line-height: 1.6; }
    .footer { background: #f8f9fa; padding: 20px 40px; text-align: center; font-size: 12px; color: #999999; border-top: 1px solid #eeeeee; }
    .btn { display: inline-block; background: #2E6DA4; color: #ffffff !important; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px; margin: 20px 0; }
    .otp-box { background: #EBF5FB; border: 2px dashed #2E6DA4; border-radius: 8px; padding: 20px; text-align: center; margin: 24px 0; }
    .otp-code { font-size: 42px; font-weight: bold; color: #2E6DA4; letter-spacing: 8px; }
    .highlight { background: #EBF5FB; border-left: 4px solid #2E6DA4; padding: 12px 16px; border-radius: 4px; margin: 16px 0; }
    .success { color: #1B5E20; }
    .warning { color: #E65100; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌏 Yatrika</h1>
      <p>Your Smart Tourism Companion</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>© 2025 Yatrika. All rights reserved.</p>
      <p>You received this email because you have an account on Yatrika.</p>
    </div>
  </div>
</body>
</html>
