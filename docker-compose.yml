version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yatrika_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yatrika_root_2025
      MYSQL_DATABASE: yatrika_db
      MYSQL_USER: yatrika_user
      MYSQL_PASSWORD: yatrika_pass_2025
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: yatrika_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: yatrika_user
      MONGO_INITDB_ROOT_PASSWORD: yatrika_pass_2025
      MONGO_INITDB_DATABASE: yatrika_logs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yatrika_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  mongo_data:
  redis_data:
